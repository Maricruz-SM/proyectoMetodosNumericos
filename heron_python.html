<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Herón Pro - Configurable</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://pyscript.net/releases/2024.1.1/core.css">
    <script type="module" src="https://pyscript.net/releases/2024.1.1/core.js"></script>
    <style>
        body { background-color: #f4f7f6; }
        .iteration-table { max-height: 400px; overflow-y: auto; }
        .card { border: none; border-radius: 12px; }
        .form-label { font-size: 0.85rem; color: #555; }
    </style>
</head>
<body>

<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-xl-10">
            <div class="text-center mb-4">
                <h2 class="fw-bold text-success">Algoritmo Iterativo de Herón</h2>
                <p class="text-muted small">Ajuste de parámetros en tiempo real con Python</p>
            </div>

            <div class="card shadow-sm mb-4">
                <div class="card-body">
                    <div class="row g-3">
                        <div class="col-md-3">
                            <label class="form-label fw-bold">Número (S):</label>
                            <input type="number" id="inputS" class="form-control" value="120">
                        </div>
                        <div class="col-md-3">
                            <label class="form-label fw-bold">Tolerancia:</label>
                            <input type="number" id="inputTolerancia" class="form-control" value="0.0001" step="0.000001">
                        </div>
                        <div class="col-md-3">
                            <label class="form-label fw-bold">Máx. Iteraciones:</label>
                            <input type="number" id="inputMaxIter" class="form-control" value="50">
                        </div>
                        <div class="col-md-3 d-flex align-items-end">
                            <button py-click="ejecutar_heron" class="btn btn-success w-100 fw-bold">
                                Iniciar Proceso
                            </button>
                        </div>
                    </div>
                </div>
            </div>

            <div id="panelResultados" class="d-none">
                <div class="row">
                    <div class="col-lg-4 mb-4">
                        <div class="card bg-success text-white shadow-sm h-100">
                            <div class="card-body d-flex flex-column justify-content-center text-center">
                                <p class="mb-1 opacity-75">Resultado Aproximado:</p>
                                <h2 id="resFinal" class="display-5 fw-bold mb-3"></h2>
                                <div id="resDetalle" class="small bg-white bg-opacity-25 p-3 rounded text-start"></div>
                            </div>
                        </div>
                    </div>
                    <div class="col-lg-8 mb-4">
                        <div class="card shadow-sm h-100">
                            <div class="card-header bg-white border-bottom fw-bold py-3 text-secondary">
                                LOG DE CONVERGENCIA
                            </div>
                            <div class="card-body iteration-table p-0">
                                <table class="table table-hover mb-0 text-center align-middle">
                                    <thead class="table-light sticky-top">
                                        <tr>
                                            <th>#</th>
                                            <th>Valor Calculado (x)</th>
                                            <th>Error Relativo</th>
                                        </tr>
                                    </thead>
                                    <tbody id="tablaBody"></tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            
            <div class="text-center mt-3">
                <a href="index.html" class="btn btn-link btn-sm text-secondary text-decoration-none">← Regresar al Panel</a>
            </div>
        </div>
    </div>
</div>

<script type="py">
from pyscript import document

def ejecutar_heron(event):
    # 1. Recuperación de variables desde las cajas de texto
    try:
        s_val = float(document.querySelector("#inputS").value)
        tolerancia_usuario = float(document.querySelector("#inputTolerancia").value)
        max_iter_usuario = int(document.querySelector("#inputMaxIter").value)
    except ValueError:
        return # Si hay datos vacíos o inválidos, no hace nada

    # 2. Referencias a la interfaz
    panel = document.querySelector("#panelResultados")
    tabla = document.querySelector("#tablaBody")
    
    # Limpieza inicial
    tabla.innerHTML = ""
    panel.classList.remove("d-none")

    # 3. Lógica del Algoritmo con variables configurables
    x = s_val if s_val > 0 else 0
    error_calculado = 100.0
    iteracion_actual = 0
    
    if s_val > 0:
        # Usamos las variables recuperadas del usuario en la condición del bucle
        while error_calculado > tolerancia_usuario and iteracion_actual < max_iter_usuario:
            iteracion_actual += 1
            anterior_x = x
            
            # Cálculo de Herón
            x = (x + s_val / x) / 2
            
            # Cálculo del error relativo porcentual
            error_calculado = abs((x - anterior_x) / x) * 100

            # Insertar fila en la tabla
            tr = document.createElement("tr")
            tr.innerHTML = f"""
                <td class="fw-bold">{iteracion_actual}</td>
                <td class="font-monospace">{x:.10f}</td>
                <td class="text-danger small">{error_calculado:.2e}%</td>
            """
            tabla.appendChild(tr)

    # 4. Mostrar resumen final
    document.querySelector("#resFinal").innerText = f"{x:.6f}"
    document.querySelector("#resDetalle").innerHTML = f"""
        <strong>Parámetros Finales:</strong><br>
        • Iteraciones: {iteracion_actual}<br>
        • Error Final: {error_calculado:.2e}%<br>
        • Límite Máximo: {max_iter_usuario}
    """
</script>

</body>
</html>
