<!DOCTYPE html>
<html>
<head>
    <title>Euler por Clic</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        #cancha {width: 100%; height: 200px; background: #f0f0f0; position: relative; border: 2px solid #ccc; border-radius: 10px; }
        #pelota { width: 30px; height: 30px; background: red; border-radius: 50%; position: absolute; top: 85px; left: 0; transition: 0.2s; }
    </style>
</head>
<body class="container py-5 text-center">

    <h3>Método de un paso: Control Manual</h3>
    <p>Cada clic representa un avance hacia un estado nuevo</p>

    <div id="cancha" class="mb-4 shadow-sm">
        <div id="pelota" id="pelota"></div>
    </div>

    <button class="btn btn-primary btn-lg" onclick="darPaso()">Dar un paso (Click)</button>
    
    <div class="mt-3">
        Posición actual: <strong id="posText">0</strong> px
    </div>

    <script>
        let x = 0; 
        let paso = 20;

        function darPaso() {
            x = x + paso;
            document.getElementById("pelota").style.left = x + "px";
            document.getElementById("posText").innerText = x;

            if (x > 1000) x = -paso; 
        }
    </script>
</body>
</html>
