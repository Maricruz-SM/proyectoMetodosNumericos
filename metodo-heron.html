<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Método de Herón - ISC</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .iteration-table { max-height: 300px; overflow-y: auto; }
        .card { border-radius: 15px; }
    </style>
</head>
<body>

<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="text-center mb-4">
                <h2 class="fw-bold text-primary">Algoritmo Iterativo de Herón</h2>
                <p class="text-muted">Cálculo de Raíz Cuadrada sin funciones nativas</p>
            </div>

            <div class="card shadow-sm mb-4">
                <div class="card-body">
                    <div class="row g-3">
                        <div class="col-sm-8">
                            <label class="form-label fw-bold">Número a calcular (S):</label>
                            <input type="number" id="numeroRaiz" class="form-control form-control-lg"  min="0">
                        </div>
                        <div class="col-sm-4 d-flex align-items-end">
                            <button onclick="ejecutarHeron()" class="btn btn-primary btn-lg w-100">Iterar</button>
                        </div>
                    </div>
                </div>
            </div>

            <div id="panelResultados" class="d-none">
                <div class="row">
                    <div class="col-md-5">
                        <div class="alert alert-success h-100 shadow-sm">
                            <h5>Resultado Final:</h5>
                            <h2 id="resFinal" class="display-6 fw-bold"></h2>
                            <hr>
                            <p id="resDetalle" class="mb-0"></p>
                        </div>
                    </div>
                    <div class="col-md-7">
                        <div class="card shadow-sm">
                            <div class="card-header bg-dark text-white fw-bold">Historial de Convergencia</div>
                            <div class="card-body iteration-table p-0">
                                <table class="table table-sm table-striped mb-0 text-center">
                                    <thead class="table-light sticky-top">
                                        <tr>
                                            <th>#</th>
                                            <th>Valor X</th>
                                            <th>Error (%)</th>
                                        </tr>
                                    </thead>
                                    <tbody id="tablaCuerpo"></tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
function ejecutarHeron() {
    const S = parseFloat(document.getElementById('numeroRaiz').value);
    const tablaCuerpo = document.getElementById('tablaCuerpo');
    const panel = document.getElementById('panelResultados');
    
    // Validaciones
    if (isNaN(S) || S < 0) {
        alert("Por favor, ingresa un número positivo.");
        return;
    }

    // Inicialización
    let x = S === 0 ? 0 : S; // Semilla inicial
    const tolerancia = 0.1;
    let error = 100;
    let iteraciones = 0;
    let anteriorX = 0;
    
    // Limpiar tabla y preparar interfaz
    tablaCuerpo.innerHTML = "";
    panel.classList.remove('d-none');

    // Bucle Iterativo
    if (S > 0) {
        while (error > tolerancia && iteraciones < 100) {
            iteraciones++;
            anteriorX = x;
            
            // Lógica de Herón: Promedio de los lados
            x = (x + S / x) / 2;
            
            // Cálculo del error relativo porcentual
            error = Math.abs((x - anteriorX) / x) * 100;

            // Agregar fila a la tabla
            const fila = `<tr>
                <td>${iteraciones}</td>
                <td>${x.toFixed(8)}</td>
                <td class="text-danger small">${error.toExponential(2)}%</td>
            </tr>`;
            tablaCuerpo.innerHTML += fila;
        }
    }

    // Mostrar resultados finales
    document.getElementById('resFinal').innerText = x.toFixed(6);
    document.getElementById('resDetalle').innerHTML = `
        Iteraciones: <strong>${iteraciones}</strong><br>
        Tolerancia: <strong>${tolerancia}</strong><br>
        Estado: <strong>Convergencia Exitosa</strong>
    `;
}
</script>
</body>
</html>
